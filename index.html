<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marc's GALE Hub</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
header { background: linear-gradient(135deg, #1e293b, #0f172a); border-bottom: 1px solid #334155; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
header h1 { font-size: 1.4rem; font-weight: 700; color: #f8fafc; }
header span { background: linear-gradient(135deg, #6366f1, #8b5cf6); padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
nav { background: #1e293b; border-bottom: 1px solid #334155; padding: 0 24px; display: flex; gap: 4px; overflow-x: auto; }
nav button { background: none; border: none; color: #94a3b8; padding: 14px 18px; cursor: pointer; font-size: 0.85rem; font-weight: 500; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.2s; }
nav button:hover { color: #e2e8f0; }
nav button.active { color: #818cf8; border-bottom-color: #818cf8; }
.container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.section { display: none; }
.section.active { display: block; }
.section-title { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
.card:hover { border-color: #4f46e5; }
.card-header { padding: 16px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #334155; }
.client-name { font-weight: 600; font-size: 1rem; color: #f1f5f9; }
.client-meta { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
.stock-badge { text-align: right; }
.stock-price { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
.stock-change { font-size: 0.75rem; font-weight: 600; margin-top: 2px; }
.stock-change.up { color: #22c55e; }
.stock-change.down { color: #ef4444; }
.private-badge { background: #1e3a5f; color: #60a5fa; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600; }
.card-body { padding: 16px; }
.subsection-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 10px; margin-top: 14px; }
.subsection-label:first-child { margin-top: 0; }
.news-item { padding: 8px 0; border-bottom: 1px solid #263147; }
.news-item:last-child { border-bottom: none; }
.news-title a { color: #818cf8; text-decoration: none; font-size: 0.82rem; line-height: 1.4; display: block; }
.news-title a:hover { text-decoration: underline; }
.news-meta { font-size: 0.7rem; color: #475569; margin-top: 3px; }
.loading { color: #475569; font-size: 0.8rem; font-style: italic; padding: 8px 0; }
.competitors { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.comp-tag { background: #0f172a; border: 1px solid #334155; color: #64748b; padding: 3px 8px; border-radius: 20px; font-size: 0.7rem; }
.industry-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
.feed-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; overflow: hidden; }
.feed-header { padding: 14px 16px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; }
.feed-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: white; }
.feed-name { font-weight: 600; font-size: 0.9rem; }
.feed-body { padding: 14px 16px; }
.sector-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.sector-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
.sector-btn:hover { border-color: #6366f1; color: #e2e8f0; }
.sector-btn.active { background: #4f46e5; border-color: #4f46e5; color: white; }
.radar-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.radar-card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 16px; }
.radar-client { font-weight: 600; font-size: 0.9rem; color: #f1f5f9; margin-bottom: 10px; }
.keyword-highlight { color: #22c55e; font-weight: 600; }
.spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #334155; border-top-color: #818cf8; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 6px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.avatar { width: 36px; height: 36px; border-radius: 8px; background: linear-gradient(135deg, #4f46e5, #7c3aed); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; color: white; flex-shrink: 0; }
.client-info { display: flex; align-items: flex-start; gap: 10px; }
</style>
</head>
<body>
<header>
  <h1>&#127970; Marc's GALE Hub</h1>
  <span>LIVE</span>
</header>
<nav>
  <button class="active" onclick="showSection('portfolio',this)">&#128202; Client Portfolio</button>
  <button onclick="showSection('trends',this)">&#128200; Industry Trends</button>
  <button onclick="showSection('sector',this)">&#127919; Sector Intelligence</button>
  <button onclick="showSection('radar',this)">&#128161; Opportunity Radar</button>
</nav>
<div class="container">
  <div id="portfolio" class="section active">
    <div class="section-title">&#128202; Client Portfolio Dashboard</div>
    <div class="grid" id="clientGrid"></div>
  </div>
  <div id="trends" class="section">
    <div class="section-title">&#128200; Marketing Industry Trends</div>
    <div class="industry-grid" id="trendsGrid"></div>
  </div>
  <div id="sector" class="section">
    <div class="section-title">&#127919; Sector Intelligence</div>
    <div class="sector-filters">
      <button class="sector-btn active" onclick="filterSector('all',this)">All Sectors</button>
      <button class="sector-btn" onclick="filterSector('healthcare',this)">&#127973; Healthcare</button>
      <button class="sector-btn" onclick="filterSector('hospitality',this)">&#127976; Hospitality</button>
      <button class="sector-btn" onclick="filterSector('autotech',this)">&#128663; Auto/Tech</button>
      <button class="sector-btn" onclick="filterSector('food',this)">&#127828; Food &amp; Beverage</button>
    </div>
    <div class="grid" id="sectorGrid"></div>
  </div>
  <div id="radar" class="section">
    <div class="section-title">&#128161; Opportunity Radar</div>
    <div class="radar-grid" id="radarGrid"></div>
  </div>
</div>
<script>
const PROXY='https://api.allorigins.win/get?url=';
const FINNHUB='d8ta1ihr01qhcnk113qgd8ta1ihr01qhcnk113r0';
const CLIENTS=[
  {name:'Athenahealth',ticker:null,sector:'healthcare',competitors:['Epic Systems','Cerner','Allscripts'],initials:'A'},
  {name:'Embrace Pet Insurance',ticker:null,sector:'healthcare',competitors:['Trupanion','Healthy Paws','Pets Best'],initials:'EP'},
  {name:'Pets Best Insurance',ticker:null,sector:'healthcare',competitors:['Trupanion','Healthy Paws','Embrace'],initials:'PB'},
  {name:'HealthEquity',ticker:'HQY',sector:'healthcare',competitors:['HSA Bank','Lively','Optum Bank'],initials:'H'},
  {name:'InterContinental Hotels Group',ticker:'IHG',sector:'hospitality',competitors:['Marriott','Hilton','Hyatt'],initials:'IH'},
  {name:'Waymo',ticker:null,sector:'autotech',competitors:['Cruise','Aurora Innovation','Tesla FSD'],initials:'W'},
  {name:'Cava',ticker:'CAVA',sector:'food',competitors:['Sweetgreen','Chipotle','Zoes Kitchen'],initials:'C'},
  {name:'Shake Shack',ticker:'SHAK',sector:'food',competitors:['Five Guys','Smashburger','BurgerFi'],initials:'SS'}
];
const FEEDS=[
  {name:'Ad Age',url:'https://adage.com/feed',color:'#ef4444',icon:'AA'},
  {name:'Digiday',url:'https://digiday.com/feed',color:'#f97316',icon:'DG'},
  {name:'Marketing Dive',url:'https://www.marketingdive.com/feeds/news/',color:'#3b82f6',icon:'MD'},
  {name:'The Drum',url:'https://www.thedrum.com/rss',color:'#8b5cf6',icon:'TD'},
  {name:'Marketing Week',url:'https://www.marketingweek.com/feed/',color:'#22c55e',icon:'MW'},
  {name:'MediaPost',url:'https://www.mediapost.com/rss.cfm',color:'#ec4899',icon:'MP'}
];
function showSection(id,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}
function timeAgo(ds){
  if(!ds)return'';
  const d=new Date(ds);
  if(isNaN(d))return'';
  const diff=(Date.now()-d)/1000;
  if(diff<3600)return Math.floor(diff/60)+'m ago';
  if(diff<86400)return Math.floor(diff/3600)+'h ago';
  return Math.floor(diff/86400)+'d ago';
}
async function fetchRSS(url,max=4){
  try{
    const res=await fetch(PROXY+encodeURIComponent(url));
    const data=await res.json();
    const parser=new DOMParser();
    const xml=parser.parseFromString(data.contents,'text/xml');
    const items=xml.querySelectorAll('item');
    return Array.from(items).slice(0,max).map(item=>{
      let link=item.querySelector('link')?.textContent?.trim()||'';
      if(!link){const l=item.getElementsByTagName('link')[0];link=l?.getAttribute('href')||l?.textContent?.trim()||'#';}
      return{
        title:(item.querySelector('title')?.textContent||'').replace(/^<!\[CDATA\[/,'').replace(/\]\]>$/,'').trim()||'No title',
        link:link||'#',
        pubDate:item.querySelector('pubDate')?.textContent||''
      };
    });
  }catch(e){return[];}
}
async function fetchStock(ticker){
  try{
    const r=await fetch('https://finnhub.io/api/v1/quote?symbol='+ticker+'&token='+FINNHUB);
    const d=await r.json();
    return{price:d.c?.toFixed(2),change:d.dp?.toFixed(2)};
  }catch(e){return null;}
}
function newsHTML(items){
  if(!items||items.length===0)return'<div class="news-item"><span style="color:#475569;font-size:0.8rem">No recent news found</span></div>';
  return items.map(i=>'<div class="news-item"><div class="news-title"><a href="'+i.link+'" target="_blank">'+i.title+'</a></div><div class="news-meta">'+timeAgo(i.pubDate)+'</div></div>').join('');
}
async function buildPortfolio(){
  const grid=document.getElementById('clientGrid');
  for(const c of CLIENTS){
    const card=document.createElement('div');
    card.className='card';
    const sid='s'+c.name.replace(/[^a-z0-9]/gi,'');
    const stockH=c.ticker
      ?'<div class="stock-badge"><div class="stock-price" id="p'+c.ticker+'">...</div><div class="stock-change" id="ch'+c.ticker+'"></div></div>'
      :'<span class="private-badge">Private</span>';
    card.innerHTML='<div class="card-header"><div class="client-info"><div class="avatar">'+c.initials+'</div><div><div class="client-name">'+c.name+'</div><div class="client-meta">'+(c.ticker?'&#128200; '+c.ticker:'&#127970; Private')+'</div></div></div>'+stockH+'</div><div class="card-body"><div class="subsection-label">Client News</div><div id="cn'+sid+'"><span class="spinner"></span></div><div class="subsection-label">Competitors</div><div class="competitors">'+c.competitors.map(x=>'<span class="comp-tag">'+x+'</span>').join('')+'</div><div class="subsection-label">Competitor News</div><div id="co'+sid+'"><span class="spinner"></span></div></div>';
    grid.appendChild(card);
    if(c.ticker)fetchStock(c.ticker).then(s=>{if(s&&s.price){document.getElementById('p'+c.ticker).textContent='$'+s.price;const el=document.getElementById('ch'+c.ticker);el.textContent=(s.change>=0?'&#9650; ':'&#9660; ')+Math.abs(s.change)+'%';el.className='stock-change '+(s.change>=0?'up':'down');}});
    fetchRSS('https://news.google.com/rss/search?q='+encodeURIComponent(c.name)+'&hl=en-US&gl=US&ceid=US:en',3).then(items=>{document.getElementById('cn'+sid).innerHTML=newsHTML(items);});
    fetchRSS('https://news.google.com/rss/search?q='+encodeURIComponent(c.competitors[0])+'&hl=en-US&gl=US&ceid=US:en',3).then(items=>{document.getElementById('co'+sid).innerHTML=newsHTML(items);});
  }
}
async function buildTrends(){
  const grid=document.getElementById('trendsGrid');
  for(const f of FEEDS){
    const card=document.createElement('div');
    card.className='feed-card';
    const uid='f'+f.name.replace(/[^a-z0-9]/gi,'');
    card.innerHTML='<div class="feed-header"><div class="feed-icon" style="background:'+f.color+'">'+f.icon+'</div><span class="feed-name">'+f.name+'</span></div><div class="feed-body"><div id="'+uid+'"><span class="spinner"></span></div></div>';
    grid.appendChild(card);
    fetchRSS(f.url,5).then(items=>{document.getElementById(uid).innerHTML=newsHTML(items);});
  }
}
function getSectorLabel(s){return{healthcare:'&#127973; Healthcare',hospitality:'&#127976; Hospitality',autotech:'&#128663; Auto/Tech',food:'&#127828; Food & Beverage'}[s]||s;}
function getSectorKw(s){return{healthcare:'healthcare fintech insurance',hospitality:'hotel hospitality travel',autotech:'autonomous vehicle self-driving tech',food:'restaurant fast casual food'}[s]||'';}
async function buildSector(){
  const grid=document.getElementById('sectorGrid');
  for(const c of CLIENTS){
    const card=document.createElement('div');
    card.className='card';
    card.dataset.sector=c.sector;
    const uid='sec'+c.name.replace(/[^a-z0-9]/gi,'');
    card.innerHTML='<div class="card-header"><div class="client-info"><div class="avatar">'+c.initials+'</div><div><div class="client-name">'+c.name+'</div><div class="client-meta">'+getSectorLabel(c.sector)+'</div></div></div></div><div class="card-body"><div id="'+uid+'"><span class="spinner"></span></div></div>';
    grid.appendChild(card);
    fetchRSS('https://news.google.com/rss/search?q='+encodeURIComponent(c.name+' '+getSectorKw(c.sector))+'&hl=en-US&gl=US&ceid=US:en',4).then(items=>{document.getElementById(uid).innerHTML=newsHTML(items);});
  }
}
function filterSector(sector,btn){
  document.querySelectorAll('.sector-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#sectorGrid .card').forEach(card=>{card.style.display=(sector==='all'||card.dataset.sector===sector)?'':'none';});
}
async function buildRadar(){
  const grid=document.getElementById('radarGrid');
  const kws=['cmo','marketing','budget','launch','campaign','spend','hire','expand','acquisition'];
  for(const c of CLIENTS){
    const card=document.createElement('div');
    card.className='radar-card';
    const uid='rad'+c.name.replace(/[^a-z0-9]/gi,'');
    card.innerHTML='<div class="radar-client">&#128161; '+c.name+'</div><div id="'+uid+'"><span class="spinner"></span></div>';
    grid.appendChild(card);
    fetchRSS('https://news.google.com/rss/search?q='+encodeURIComponent(c.name+' marketing launch expansion')+'&hl=en-US&gl=US&ceid=US:en',3).then(items=>{
      const el=document.getElementById(uid);
      if(!items||items.length===0){el.innerHTML='<span style="color:#475569;font-size:0.8rem">No signals detected</span>';return;}
      el.innerHTML=items.map(i=>{
        let t=i.title;
        kws.forEach(k=>{t=t.replace(new RegExp('('+k+')','gi'),'<span class="keyword-highlight">$1</span>');});
        return'<div class="news-item"><div class="news-title"><a href="'+i.link+'" target="_blank">'+t+'</a></div><div class="news-meta">'+timeAgo(i.pubDate)+'</div></div>';
      }).join('');
    });
  }
}
buildPortfolio();buildTrends();buildSector();buildRadar();
</script>
</body>
</html>
