<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marc's GALE Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
            color: #e5e7eb;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #4f8ef7;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            color: #4f8ef7;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(79, 142, 247, 0.5);
        }

        .subtitle {
            color: #9ca3af;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .refresh-btn {
            background: #4f8ef7;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(79, 142, 247, 0.3);
        }

        .refresh-btn:hover {
            background: #3d7ae0;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(79, 142, 247, 0.4);
        }

        .refresh-btn:disabled {
            background: #6b7280;
            cursor: not-allowed;
            transform: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab-btn {
            background: #111827;
            color: #9ca3af;
            border: 2px solid transparent;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            color: #4f8ef7;
            border-color: #4f8ef7;
        }

        .tab-btn.active {
            background: #4f8ef7;
            color: white;
            border-color: #4f8ef7;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .client-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .client-card {
            background: #111827;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #1f2937;
            transition: all 0.3s;
        }

        .client-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(79, 142, 247, 0.2);
            border-color: #4f8ef7;
        }

        .client-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #374151;
        }

        .client-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #4f8ef7;
        }

        .stock-info {
            text-align: right;
        }

        .stock-price {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .stock-change {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .stock-change.positive {
            color: #10b981;
        }

        .stock-change.negative {
            color: #ef4444;
        }

        .news-section {
            margin-top: 16px;
        }

        .section-title {
            font-size: 0.9rem;
            color: #9ca3af;
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .news-item {
            padding: 12px;
            margin-bottom: 10px;
            background: #1f2937;
            border-radius: 8px;
            border-left: 3px solid #4f8ef7;
            transition: all 0.2s;
        }

        .news-item:hover {
            background: #374151;
            transform: translateX(4px);
        }

        .news-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .news-title a {
            color: #e5e7eb;
            text-decoration: none;
            transition: color 0.2s;
        }

        .news-title a:hover {
            color: #4f8ef7;
        }

        .news-meta {
            font-size: 0.85rem;
            color: #9ca3af;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }

        .spinner {
            border: 4px solid #1f2937;
            border-top: 4px solid #4f8ef7;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            color: #ef4444;
            font-size: 0.9rem;
            padding: 8px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 6px;
            margin-top: 8px;
        }

        .industry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 24px;
        }

        .industry-card {
            background: #111827;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #1f2937;
        }

        .industry-card h3 {
            color: #4f8ef7;
            margin-bottom: 16px;
            font-size: 1.3rem;
        }

        .sector-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            background: #111827;
            color: #9ca3af;
            border: 2px solid #374151;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: #4f8ef7;
            color: #4f8ef7;
        }

        .filter-btn.active {
            background: #4f8ef7;
            color: white;
            border-color: #4f8ef7;
        }

        .competitor-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #374151;
        }

        .competitor-label {
            font-size: 0.85rem;
            color: #f59e0b;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .client-grid,
            .industry-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Marc's GALE Hub</h1>
            <p class="subtitle">Real-time Client Intelligence Dashboard</p>
        </header>

        <div class="controls">
            <button class="refresh-btn" onclick="refreshAllData()">🔄 Refresh All Data</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('portfolio')">Client Portfolio</button>
            <button class="tab-btn" onclick="switchTab('trends')">Industry Trends</button>
            <button class="tab-btn" onclick="switchTab('sector')">Sector Intelligence</button>
            <button class="tab-btn" onclick="switchTab('opportunities')">Opportunity Radar</button>
        </div>

        <div id="portfolio" class="tab-content active">
            <div class="client-grid" id="clientGrid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading client data...</p>
                </div>
            </div>
        </div>

        <div id="trends" class="tab-content">
            <div class="industry-grid" id="trendsGrid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading industry trends...</p>
                </div>
            </div>
        </div>

        <div id="sector" class="tab-content">
            <div class="sector-filters">
                <button class="filter-btn active" onclick="filterSector('all')">All Sectors</button>
                <button class="filter-btn" onclick="filterSector('healthcare')">Healthcare</button>
                <button class="filter-btn" onclick="filterSector('hospitality')">Hospitality</button>
                <button class="filter-btn" onclick="filterSector('autotech')">Auto/Tech</button>
                <button class="filter-btn" onclick="filterSector('foodbev')">Food & Beverage</button>
            </div>
            <div class="client-grid" id="sectorGrid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading sector intelligence...</p>
                </div>
            </div>
        </div>

        <div id="opportunities" class="tab-content">
            <div class="industry-grid" id="opportunitiesGrid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading opportunities...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const FINNHUB_API_KEY = 'd8ta1ihr01qhcnk113qgd8ta1ihr01qhcnk113r0';
        const RSS2JSON_API = 'https://api.rss2json.com/v1/api.json?rss_url=';

        const clients = [
            {
                name: 'Athenahealth',
                query: 'Athenahealth',
                stock: null,
                sector: 'healthcare',
                competitors: ['Epic Systems', 'Cerner', 'Allscripts']
            },
            {
                name: 'Embrace Pet Insurance',
                query: 'Embrace Pet Insurance',
                stock: null,
                sector: 'healthcare',
                competitors: ['Trupanion', 'Healthy Paws', 'Pets Best']
            },
            {
                name: 'Pets Best Insurance',
                query: 'Pets Best Insurance',
                stock: null,
                sector: 'healthcare',
                competitors: ['Trupanion', 'Healthy Paws', 'Embrace']
            },
            {
                name: 'HealthEquity',
                query: 'HealthEquity',
                stock: 'HQY',
                sector: 'healthcare',
                competitors: ['HSA Bank', 'Lively', 'Optum']
            },
            {
                name: 'InterContinental Hotels Group',
                query: 'InterContinental Hotels IHG',
                stock: 'IHG',
                sector: 'hospitality',
                competitors: ['Marriott', 'Hilton', 'Hyatt']
            },
            {
                name: 'Waymo',
                query: 'Waymo',
                stock: null,
                sector: 'autotech',
                competitors: ['Cruise', 'Aurora Innovation', 'Tesla FSD']
            },
            {
                name: 'Cava',
                query: 'Cava restaurant',
                stock: 'CAVA',
                sector: 'foodbev',
                competitors: ['Sweetgreen', 'Chipotle', 'Panera']
            },
            {
                name: 'Shake Shack',
                query: 'Shake Shack',
                stock: 'SHAK',
                sector: 'foodbev',
                competitors: ['Five Guys', 'Smashburger', 'BurgerFi']
            }
        ];

        const industryFeeds = [
            { name: 'Ad Age', url: 'https://adage.com/feed' },
            { name: 'Digiday', url: 'https://digiday.com/feed' },
            { name: 'Marketing Dive', url: 'https://www.marketingdive.com/feeds/news/' }
        ];

        const opportunityQueries = [
            'CMO hire 2025',
            'Chief Marketing Officer appointment',
            'marketing budget increase 2025',
            'new product launch',
            'brand relaunch',
            'marketing leadership change'
        ];

        let clientData = [];
        let currentSectorFilter = 'all';

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'trends' && document.getElementById('trendsGrid').innerHTML.includes('Loading')) {
                loadIndustryTrends();
            } else if (tabName === 'opportunities' && document.getElementById('opportunitiesGrid').innerHTML.includes('Loading')) {
                loadOpportunities();
            }
        }

        async function fetchNews(query, maxItems = 4) {
            try {
                const googleNewsUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=en-US&gl=US&ceid=US:en`;
                const response = await fetch(RSS2JSON_API + encodeURIComponent(googleNewsUrl));
                const data = await response.json();
                
                if (data.status === 'ok' && data.items) {
                    return data.items.slice(0, maxItems).map(item => ({
                        title: item.title,
                        link: item.link,
                        source: item.author || 'Google News',
                        date: new Date(item.pubDate).toLocaleDateString()
                    }));
                }
                return [];
            } catch (error) {
                console.error('Error fetching news:', error);
                return [];
            }
        }

        async function fetchRSSFeed(feedUrl, maxItems = 8) {
            try {
                const response = await fetch(RSS2JSON_API + encodeURIComponent(feedUrl));
                const data = await response.json();
                
                if (data.status === 'ok' && data.items) {
                    return data.items.slice(0, maxItems).map(item => ({
                        title: item.title,
                        link: item.link,
                        source: data.feed.title || 'RSS Feed',
                        date: new Date(item.pubDate).toLocaleDateString()
                    }));
                }
                return [];
            } catch (error) {
                console.error('Error fetching RSS feed:', error);
                return [];
            }
        }

        async function fetchStockPrice(symbol) {
            try {
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${symbol}&token=${FINNHUB_API_KEY}`);
                const data = await response.json();
                
                if (data.c && data.dp !== undefined) {
                    return {
                        price: data.c.toFixed(2),
                        change: data.dp.toFixed(2),
                        isPositive: data.dp >= 0
                    };
                }
                return null;
            } catch (error) {
                console.error('Error fetching stock price:', error);
                return null;
            }
        }

        function renderNewsItems(newsItems, isCompetitor = false) {
            if (!newsItems || newsItems.length === 0) {
                return '<div class="error-message">No news available</div>';
            }

            return newsItems.map(item => `
                <div class="news-item">
                    ${isCompetitor ? '<div class="competitor-label">COMPETITOR</div>' : ''}
                    <div class="news-title">
                        <a href="${item.link}" target="_blank">${item.title}</a>
                    </div>
                    <div class="news-meta">${item.source} • ${item.date}</div>
                </div>
            `).join('');
        }

        async function loadClientPortfolio() {
            const grid = document.getElementById('clientGrid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading client data...</p></div>';

            clientData = [];

            for (const client of clients) {
                const newsPromise = fetchNews(client.query, 4);
                const stockPromise = client.stock ? fetchStockPrice(client.stock) : Promise.resolve(null);
                const competitorNewsPromises = client.competitors.map(comp => fetchNews(comp, 2));

                const [news, stock, ...competitorNews] = await Promise.all([
                    newsPromise,
                    stockPromise,
                    ...competitorNewsPromises
                ]);

                clientData.push({
                    ...client,
                    news,
                    stock,
                    competitorNews: competitorNews.flat()
                });
            }

            renderClientGrid();
        }

        function renderClientGrid() {
            const grid = document.getElementById('clientGrid');
            
            grid.innerHTML = clientData.map(client => `
                <div class="client-card">
                    <div class="client-header">
                        <div class="client-name">${client.name}</div>
                        ${client.stock ? `
                            <div class="stock-info">
                                <div class="stock-price">$${client.stock.price || '--'}</div>
                                <div class="stock-change ${client.stock.isPositive ? 'positive' : 'negative'}">
                                    ${client.stock.isPositive ? '▲' : '▼'} ${Math.abs(client.stock.change)}%
                                </div>
                            </div>
                        ` : ''}
                    </div>
                    
                    <div class="news-section">
                        <div class="section-title">Latest News</div>
                        ${renderNewsItems(client.news)}
                    </div>

                    ${client.competitorNews && client.competitorNews.length > 0 ? `
                        <div class="competitor-section">
                            <div class="section-title">Competitor Activity</div>
                            ${renderNewsItems(client.competitorNews.slice(0, 3), true)}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        async function loadIndustryTrends() {
            const grid = document.getElementById('trendsGrid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading industry trends...</p></div>';

            const trendsData = [];

            for (const feed of industryFeeds) {
                const news = await fetchRSSFeed(feed.url, 8);
                trendsData.push({
                    name: feed.name,
                    news
                });
            }

            grid.innerHTML = trendsData.map(source => `
                <div class="industry-card">
                    <h3>${source.name}</h3>
                    ${renderNewsItems(source.news)}
                </div>
            `).join('');
        }

        function filterSector(sector) {
            currentSectorFilter = sector;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            renderSectorGrid();
        }

        function renderSectorGrid() {
            const grid = document.getElementById('sectorGrid');
            
            let filteredClients = clientData;
            if (currentSectorFilter !== 'all') {
                filteredClients = clientData.filter(c => c.sector === currentSectorFilter);
            }

            if (filteredClients.length === 0) {
                grid.innerHTML = '<div class="loading"><p>No clients in this sector</p></div>';
                return;
            }

            grid.innerHTML = filteredClients.map(client => `
                <div class="client-card">
                    <div class="client-header">
                        <div class="client-name">${client.name}</div>
                        <div style="color: #9ca3af; font-size: 0.9rem; text-transform: uppercase;">
                            ${client.sector}
                        </div>
                    </div>
                    
                    <div class="news-section">
                        <div class="section-title">Sector News</div>
                        ${renderNewsItems(client.news)}
                    </div>

                    <div class="competitor-section">
                        <div class="section-title">Key Competitors: ${client.competitors.join(', ')}</div>
                        ${client.competitorNews ? renderNewsItems(client.competitorNews.slice(0, 2), true) : ''}
                    </div>
                </div>
            `).join('');
        }

        async function loadOpportunities() {
            const grid = document.getElementById('opportunitiesGrid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading opportunities...</p></div>';

            const opportunities = [];

            for (const query of opportunityQueries) {
                const news = await fetchNews(query, 6);
                opportunities.push({
                    category: query,
                    news
                });
            }

            grid.innerHTML = opportunities.map(opp => `
                <div class="industry-card">
                    <h3>🎯 ${opp.category}</h3>
                    ${renderNewsItems(opp.news)}
                </div>
            `).join('');
        }

        async function refreshAllData() {
            const btn = document.querySelector('.refresh-btn');
            btn.disabled = true;
            btn.textContent = '⏳ Refreshing...';

            await loadClientPortfolio();
            
            // Reset other tabs to reload on next view
            document.getElementById('trendsGrid').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading industry trends...</p></div>';
            document.getElementById('opportunitiesGrid').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading opportunities...</p></div>';

            btn.disabled = false;
            btn.textContent = '🔄 Refresh All Data';
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', async () => {
            await loadClientPortfolio();
        });
    </script>
</body>
</html>
