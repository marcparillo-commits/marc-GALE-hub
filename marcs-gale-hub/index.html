<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marc's GALE Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 2px solid #334155;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }

        .tab-button {
            background: #1e293b;
            color: #94a3b8;
            border: 2px solid #334155;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .tab-button:hover {
            background: #334155;
            color: #ffffff;
            transform: translateY(-2px);
        }

        .tab-button.active {
            background: #3b82f6;
            color: #ffffff;
            border-color: #3b82f6;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: #3b82f6;
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2);
        }

        .card-header {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 5px;
        }

        .card-subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .ticker-badge {
            display: inline-block;
            background: #334155;
            color: #3b82f6;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 5px;
        }

        .private-badge {
            display: inline-block;
            background: #334155;
            color: #94a3b8;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 5px;
        }

        .stock-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 12px;
            background: #0f172a;
            border-radius: 8px;
        }

        .stock-price {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .stock-change {
            font-size: 1rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .positive {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .negative {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .news-list {
            list-style: none;
        }

        .news-item {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #334155;
        }

        .news-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .news-title {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            line-height: 1.4;
            display: block;
            margin-bottom: 5px;
            transition: color 0.2s ease;
        }

        .news-title:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        .news-meta {
            color: #94a3b8;
            font-size: 0.8rem;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .news-source {
            font-weight: 500;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .spinner {
            border: 3px solid #334155;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin: 10px 0;
        }

        .section-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .section-tab {
            background: #1e293b;
            color: #94a3b8;
            border: 2px solid #334155;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }

        .section-tab:hover {
            background: #334155;
            color: #ffffff;
        }

        .section-tab.active {
            background: #10b981;
            color: #ffffff;
            border-color: #10b981;
        }

        .opportunity-card {
            position: relative;
        }

        .signal-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 12px;
            height: 12px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(1.2);
            }
        }

        .opportunity-label {
            display: inline-block;
            background: #10b981;
            color: #ffffff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            .nav-tabs {
                flex-direction: column;
            }

            .tab-button {
                width: 100%;
            }
        }

        .info-message {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            color: #3b82f6;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>Marc's GALE Hub</h1>
        <p class="subtitle">Client Intelligence & Market Insights Dashboard</p>
    </header>

    <div class="container">
        <nav class="nav-tabs">
            <button class="tab-button active" onclick="switchTab('client-portfolio')">Client Portfolio</button>
            <button class="tab-button" onclick="switchTab('marketing-trends')">Marketing Trends</button>
            <button class="tab-button" onclick="switchTab('sector-intelligence')">Sector Intelligence</button>
            <button class="tab-button" onclick="switchTab('opportunity-radar')">Opportunity Radar</button>
        </nav>

        <!-- CLIENT PORTFOLIO TAB -->
        <div id="client-portfolio" class="tab-content active">
            <div class="grid" id="client-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading client data...</p>
                </div>
            </div>
        </div>

        <!-- MARKETING TRENDS TAB -->
        <div id="marketing-trends" class="tab-content">
            <div class="grid" id="trends-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading marketing trends...</p>
                </div>
            </div>
        </div>

        <!-- SECTOR INTELLIGENCE TAB -->
        <div id="sector-intelligence" class="tab-content">
            <div class="section-tabs">
                <button class="section-tab active" onclick="loadSectorNews('Healthcare')">Healthcare</button>
                <button class="section-tab" onclick="loadSectorNews('Hospitality')">Hospitality</button>
                <button class="section-tab" onclick="loadSectorNews('Autonomous Vehicles')">Autonomous Vehicles</button>
                <button class="section-tab" onclick="loadSectorNews('Food & Beverage')">Food & Beverage</button>
            </div>
            <div class="grid" id="sector-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading sector intelligence...</p>
                </div>
            </div>
        </div>

        <!-- OPPORTUNITY RADAR TAB -->
        <div id="opportunity-radar" class="tab-content">
            <div class="grid" id="opportunity-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Scanning for opportunities...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Keys
        const NEWS_API_KEY = "98a5912efd304a9ca22415fb6d844a46";
        const FINNHUB_API_KEY = "d8ta1ihr01qhcnk113qgd8ta1ihr01qhcnk113r0";

        // Client data
        const clients = [
            { name: "HealthEquity", ticker: "HQY", type: "public" },
            { name: "InterContinental Hotels", ticker: "IHG", type: "public" },
            { name: "Cava", ticker: "CAVA", type: "public" },
            { name: "Shake Shack", ticker: "SHAK", type: "public" },
            { name: "Athenahealth", ticker: null, type: "private" },
            { name: "Waymo", ticker: null, type: "private" },
            { name: "Embrace Pet Insurance", ticker: null, type: "private" },
            { name: "Pets Best Insurance", ticker: null, type: "private" }
        ];

        // Tab switching
        function switchTab(tabId) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Remove active class from all buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab
            document.getElementById(tabId).classList.add('active');
            
            // Activate button
            event.target.classList.add('active');
            
            // Load content if needed
            if (tabId === 'client-portfolio' && !window.clientsLoaded) {
                loadClientPortfolio();
            } else if (tabId === 'marketing-trends' && !window.trendsLoaded) {
                loadMarketingTrends();
            } else if (tabId === 'sector-intelligence' && !window.sectorLoaded) {
                loadSectorNews('Healthcare');
            } else if (tabId === 'opportunity-radar' && !window.opportunityLoaded) {
                loadOpportunityRadar();
            }
        }

        // Fetch stock data
        async function fetchStockData(ticker) {
            try {
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${ticker}&token=${FINNHUB_API_KEY}`);
                if (!response.ok) throw new Error('Stock API error');
                return await response.json();
            } catch (error) {
                console.error(`Error fetching stock for ${ticker}:`, error);
                return null;
            }
        }

        // Fetch news
        async function fetchNews(query, pageSize = 3) {
            try {
                const url = `https://newsapi.org/v2/everything?q=${encodeURIComponent(query)}&apiKey=${NEWS_API_KEY}&pageSize=${pageSize}&sortBy=publishedAt&language=en`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                if (data.status === 'error') {
                    throw new Error(data.message || 'API error');
                }
                
                return data.articles || [];
            } catch (error) {
                console.error(`Error fetching news for "${query}":`, error);
                return null;
            }
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) {
                const diffHours = Math.floor(diffTime / (1000 * 60 * 60));
                return diffHours === 0 ? 'Just now' : `${diffHours}h ago`;
            } else if (diffDays === 1) {
                return 'Yesterday';
            } else if (diffDays < 7) {
                return `${diffDays}d ago`;
            } else {
                return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
            }
        }

        // Render news items
        function renderNewsItems(articles) {
            if (!articles || articles.length === 0) {
                return '<div class="error-message">No recent news articles found.</div>';
            }
            
            return `
                <ul class="news-list">
                    ${articles.slice(0, 3).map(article => `
                        <li class="news-item">
                            <a href="${article.url}" target="_blank" rel="noopener noreferrer" class="news-title">
                                ${article.title || 'Untitled'}
                            </a>
                            <div class="news-meta">
                                <span class="news-source">${article.source?.name || 'Unknown Source'}</span>
                                <span>•</span>
                                <span>${formatDate(article.publishedAt)}</span>
                            </div>
                        </li>
                    `).join('')}
                </ul>
            `;
        }

        // Load client portfolio
        async function loadClientPortfolio() {
            const grid = document.getElementById('client-grid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading client data...</p></div>';
            
            const clientCards = await Promise.all(clients.map(async (client) => {
                let stockHTML = '';
                
                if (client.type === 'public') {
                    const stockData = await fetchStockData(client.ticker);
                    if (stockData && stockData.c) {
                        const change = stockData.d || 0;
                        const changePercent = stockData.dp || 0;
                        const isPositive = change >= 0;
                        
                        stockHTML = `
                            <div class="stock-info">
                                <div>
                                    <span class="stock-price">$${stockData.c.toFixed(2)}</span>
                                </div>
                                <div class="stock-change ${isPositive ? 'positive' : 'negative'}">
                                    ${isPositive ? '▲' : '▼'} ${Math.abs(changePercent).toFixed(2)}%
                                </div>
                            </div>
                        `;
                    }
                }
                
                const news = await fetchNews(client.name);
                let newsHTML = '';
                
                if (news === null) {
                    newsHTML = `
                        <div class="info-message">
                            News temporarily unavailable. Enable API access: NewsAPI free tier may require server-side proxy for CORS.
                        </div>
                    `;
                } else {
                    newsHTML = renderNewsItems(news);
                }
                
                return `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">${client.name}</h3>
                            ${client.type === 'public' 
                                ? `<span class="ticker-badge">${client.ticker}</span>` 
                                : `<span class="private-badge">Private</span>`
                            }
                        </div>
                        ${stockHTML}
                        ${newsHTML}
                    </div>
                `;
            }));
            
            grid.innerHTML = clientCards.join('');
            window.clientsLoaded = true;
        }

        // Load marketing trends
        async function loadMarketingTrends() {
            const grid = document.getElementById('trends-grid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading marketing trends...</p></div>';
            
            const queries = [
                "digital marketing trends",
                "advertising technology",
                "programmatic advertising",
                "marketing AI"
            ];
            
            const trendCards = await Promise.all(queries.map(async (query) => {
                const news = await fetchNews(query, 5);
                
                let newsHTML = '';
                if (news === null) {
                    newsHTML = `
                        <div class="info-message">
                            News temporarily unavailable. Enable API access: NewsAPI free tier may require server-side proxy for CORS.
                        </div>
                    `;
                } else {
                    newsHTML = renderNewsItems(news);
                }
                
                return `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">${query.split(' ').map(word => 
                                word.charAt(0).toUpperCase() + word.slice(1)
                            ).join(' ')}</h3>
                            <p class="card-subtitle">Latest insights and updates</p>
                        </div>
                        ${newsHTML}
                    </div>
                `;
            }));
            
            grid.innerHTML = trendCards.join('');
            window.trendsLoaded = true;
        }

        // Load sector news
        async function loadSectorNews(sector) {
            const grid = document.getElementById('sector-grid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading sector intelligence...</p></div>';
            
            // Update active tab
            document.querySelectorAll('.section-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent === sector) {
                    tab.classList.add('active');
                }
            });
            
            const sectorQueries = {
                'Healthcare': ['healthcare technology', 'digital health', 'telehealth', 'health insurance innovation'],
                'Hospitality': ['hotel industry trends', 'hospitality technology', 'travel industry', 'hotel marketing'],
                'Autonomous Vehicles': ['autonomous vehicles', 'self-driving cars', 'Waymo', 'AV technology'],
                'Food & Beverage': ['restaurant industry trends', 'food delivery', 'fast casual dining', 'restaurant technology']
            };
            
            const queries = sectorQueries[sector] || [sector];
            
            const sectorCards = await Promise.all(queries.map(async (query) => {
                const news = await fetchNews(query, 4);
                
                let newsHTML = '';
                if (news === null) {
                    newsHTML = `
                        <div class="info-message">
                            News temporarily unavailable. Enable API access: NewsAPI free tier may require server-side proxy for CORS.
                        </div>
                    `;
                } else {
                    newsHTML = renderNewsItems(news);
                }
                
                return `
                    <div class="card">
                        <div class="card-header">
                            <h3 class="card-title">${query.split(' ').map(word => 
                                word.charAt(0).toUpperCase() + word.slice(1)
                            ).join(' ')}</h3>
                            <p class="card-subtitle">${sector} Sector</p>
                        </div>
                        ${newsHTML}
                    </div>
                `;
            }));
            
            grid.innerHTML = sectorCards.join('');
            window.sectorLoaded = true;
        }

        // Load opportunity radar
        async function loadOpportunityRadar() {
            const grid = document.getElementById('opportunity-grid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>Scanning for opportunities...</p></div>';
            
            const queries = [
                "CMO appointed 2025",
                "marketing budget increase",
                "brand relaunch",
                "new marketing agency"
            ];
            
            const opportunityCards = await Promise.all(queries.map(async (query) => {
                const news = await fetchNews(query, 4);
                
                let newsHTML = '';
                if (news === null) {
                    newsHTML = `
                        <div class="info-message">
                            News temporarily unavailable. Enable API access: NewsAPI free tier may require server-side proxy for CORS.
                        </div>
                    `;
                } else {
                    newsHTML = renderNewsItems(news);
                }
                
                return `
                    <div class="card opportunity-card">
                        <div class="signal-indicator"></div>
                        <div class="card-header">
                            <span class="opportunity-label">SIGNAL</span>
                            <h3 class="card-title">${query.split(' ').map(word => 
                                word.charAt(0).toUpperCase() + word.slice(1)
                            ).join(' ')}</h3>
                            <p class="card-subtitle">Business development opportunity</p>
                        </div>
                        ${newsHTML}
                    </div>
                `;
            }));
            
            grid.innerHTML = opportunityCards.join('');
            window.opportunityLoaded = true;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadClientPortfolio();
        });
    </script>
</body>
</html>
